<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f9ff;
            color: #1e2a3a;
        }
        header {
            background: linear-gradient(135deg, #0078D4 0%, #005a9e 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        main {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 1rem;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            margin-top: 1.5rem;
            background: #0078D4;
            color: white;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #005a9e; }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .message.error {
            background: #ffe6e6;
            color: #c00;
        }
        .message.success {
            background: #e6ffe6;
            color: #0a0;
        }
        footer {
            background: #e6f3ff;
            text-align: center;
            padding: 1rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
<header>
    <h1><i class="fas fa-user-circle"></i> Connexion</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="recommandation.html">Recommandation</a>
        <a href="rdv.html">RDV</a>
        <a href="login.html">Connexion</a>
    </nav>
</header>
<main>
    <div class="card">
        <h2>🔐 Accès patient</h2>
        <form id="loginForm">
            <label>Email :</label>
            <input type="email" id="email" placeholder="patient@exemple.com" required>

            <label>Mot de passe :</label>
            <input type="password" id="password" placeholder="••••••" required>

            <button type="submit">Se connecter</button>
        </form>
        <div id="message" class="message" style="display:none;"></div>
        <p style="margin-top: 1rem; font-size: 0.8rem; text-align: center;">
            👉 Test : patient@test.com / 1234
        </p>
    </div>
</main>
<footer>© 2025 - Projet PFE - Université Centrale</footer>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        // Identifiants de test
        if (email === "patient@test.com" && password === "1234") {
            messageDiv.className = "message success";
            messageDiv.style.display = "block";
            messageDiv.innerHTML = "✅ Connexion réussie ! Redirection vers le tableau de bord...";
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
        } else {
            messageDiv.className = "message error";
            messageDiv.style.display = "block";
            messageDiv.innerHTML = "❌ Email ou mot de passe incorrect. Veuillez réessayer.";
        }
    });
</script>
</body>
</html>
